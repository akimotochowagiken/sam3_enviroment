services:
  sam3-dev:
    # 方法A: ホストで事前ビルドしたイメージを使う（後述READMEの手順1）
    image: sam3-dev:latest
    # 方法B: Portainerの「Repository」デプロイでDockerfileからビルドする場合は
    # 下のbuildを有効化（image行はそのまま残してOK）
    # build:
    #   context: .
    #   dockerfile: Dockerfile

    container_name: sam3-dev
    restart: unless-stopped

    # GPUを割り当てる（NVIDIA Container Toolkit が必要）
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all          # 特定GPUのみなら count を消して device_ids: ["0"] 等に
              capabilities: [gpu]

    environment:
      # Hugging Face のアクセストークン（ゲート付きチェックポイントDL用）
      # Portainer の Stack 画面下「Environment variables」で HF_TOKEN を設定する
      - HF_TOKEN=${HF_TOKEN}
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
      # VS Code Remote-SSH 用の公開鍵（id_ed25519.pub の中身を貼る）
      # Portainer の Environment variables で SSH_PUBKEY に設定する
      - SSH_PUBKEY=${SSH_PUBKEY}
      - ENABLE_JUPYTER=1          # JupyterLab不要なら 0
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility

    ports:
      - "2222:22"               # SSH（VS Code Remote-SSH の接続先）
      - "8888:8888"             # JupyterLab（社内ネットからアクセス）

    volumes:
      - sam3_workspace:/workspace        # コード・データ・モデルを永続化
    # ホストの既存データを使いたい場合は bind mount に置き換え:
    #   - /srv/sam3/workspace:/workspace

    shm_size: "8gb"             # DataLoader等のための共有メモリ
    # 検証で行き詰まったら exec で中に入る:  docker exec -it sam3-dev bash

volumes:
  sam3_workspace:
