services:
  sam3-dev:
    # Portainerの「Repository」デプロイでDockerfileからビルドする構成
    image: sam3-dev:latest
    build:
      context: .
      dockerfile: Dockerfile
    pull_policy: build          # pullせず必ずローカルでビルドする（重要）

    container_name: sam3-dev
    restart: unless-stopped

    # GPUを割り当てる（NVIDIA Container Toolkit が必要）
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all          # 特定GPUのみなら count を消して device_ids: ["0"] 等に
              capabilities: [gpu]

    environment:
      # Hugging Face のアクセストークン（ゲート付きチェックポイントDL用）
      - HF_TOKEN=${HF_TOKEN}
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
      # VS Code Remote-SSH 用の公開鍵（id_ed25519.pub の中身を貼る）
      - SSH_PUBKEY=${SSH_PUBKEY}
      - ENABLE_JUPYTER=1          # JupyterLab不要なら 0
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility

    ports:
      - "2222:22"               # SSH（VS Code Remote-SSH の接続先）
      - "8888:8888"             # JupyterLab（社内ネットからアクセス）

    volumes:
      - sam3_workspace:/workspace        # コード・データ・モデルを永続化

    shm_size: "8gb"             # DataLoader等のための共有メモリ

volumes:
  sam3_workspace:
